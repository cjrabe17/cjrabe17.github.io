<!DOCTYPE html>
<html lang="en-us">
<head>
	<meta charset="UTF-8">
	<title>Rock Paper Scissors</title>
	<!-- Bootstrap Reference -->
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<!-- jQuery Reference -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<!-- Firebase Reference -->
	<script src="https://www.gstatic.com/firebasejs/4.8.1/firebase.js"></script>
	<!-- Personal CSS Reference -->
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
	<!-- Mobile first -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<header class="text-center bg-primary">
	<h1>Rock, Paper, Scissors</h1>
</header>

<div class="container">
	<div class="row">
		<div class="col-md-12 text-center nameInput">
			<form class="form-inline">
				<input type="text" placeholder="Name" class="form-control playerName">
				<button type="submit" class="btn btn-default submitName">Submit</button>
			</form>
		</div>
	</div>
	<br>
	<div class="row">
		<!-- Div for player 1 options -->
		<div class="col-md-4 playerOneButtons boxes text-center">
			<h3>Waiting for Player 1</h3>
			<br>
			<br>
			<br>
			<br>
			<br>
		</div>
		<!-- Div to contain RPS results -->
		<div class="col-md-4 boxes text-center"></div>
		<!-- Div for player 2 options -->
		<div class="col-md-4 playerTwoButtons boxes text-center">
			<h3>Waiting for Player 2</h3>
			<br>
			<br>
			<br>
			<br>
			<br>
		</div>
	</div>
	<br>
	<!-- Chat box -->
	<div class="row">
		<div class="col-md-6 col-md-offset-3">
			<div id="chatbox"></div>
			<br>
			<form name="message" class="form-inline">
				<input type="text" placeholder="Type message here to talk to your opponent" name="playerMessage" class="form-control">
				<button type="submit" class="btn btn-default" id="submitMessage">Send</button>
			</form>
		</div>
	</div>
</div>

<script type="text/javascript" src="assets/javascript/game.js"></script>

</body>
</html>
