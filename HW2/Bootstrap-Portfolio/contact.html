<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Bootstrap Portfolio</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="assets/css/reset.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
</head>
<body>

<div class="container">
	<!-- Header and nav -->
	<nav class="navbar navbar-default navbar-fixed-top">
		<div class="container">
		    <div class="col-md-4 col-sm-12">
		    	<h1 class="nomargin nopadding">Cassandra Rabe</h1>
		    </div>
		    <div class="header-nav col-md-4 col-sm-12 pull-right text-center">
		    	<a href="index.html" role="navigation">About</a> |
		    	<a href="portfolio.html" role="navigation">Portfolio</a> |
		    	<a href="contact.html" role="navigation">Contact</a>
		    </div>
		</div>
	</nav>
</div>

<div class="container section">
	<div class="row">
		<!-- Content section -->
		<div class="content col-md-8 col-sm-12">
			<h2>Contact</h2>
			<hr>
			
			<form>
			 	Name<br>
				<input type="text" class="inputRow" name="Name" placeholder="John Smith">
				<br>
				Email Address<br>
				<input type="email" class="inputRow" name="emailAddress" placeholder="example@gmail.com">
				<br>
				Message<br>
				<textarea name="message"></textarea>
				<br>
				<input type="submit" class="submitButton" value="Submit">
			</form>
			
		</div>

		<!-- Sidebar-->
		<div class="col-md-4 col-sm-12">
			<div class="panel panel-default">
				<div class="panel-heading">
					<h3 class="panel-title">Connect With Me</h3>
				</div>
				<div class="panel-body text-center">
					<a href="https://github.com/cjrabe17" target="_blank">
						<img src="assets/images/GitHub-Mark-64px.png" alt="GitHub Icon">
					</a>

					<a href="mailto:cjrabe17@gmail.com">
						<img src="assets/images/emailicon.png" alt="Email Icon">
					</a>
					
					<a href="https://www.linkedin.com/in/cjrabe17/" target="_blank">
						<img src="assets/images/linkedinicon.png" alt="LinkedIn Icon">
					</a>					
				</div>
			</div>
		</div>
	</div>
</div>

<nav class="navbar navbar-default navbar-fixed-bottom">
	<div class="container-fluid text-center">
		© Copyright 2017 Cassandra Rabe
	</div>
</nav>
