<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
	<script src="https://code.jquery.com/jquery-3.2.1.js" integrity=sha256-DZAnKJ/6XZ9si04Hgrsxu/8s717jcIzLy3oi35EouyE=" crossorigin="anonymous"></script>
	<title>NCAA Basketball RPG</title>
</head>
<body>

<header>
	<h1>NCAA Basketball RPG Game!</h1>
</header>
<div class="container-fluid">
	<div class="row">
		<div class="col-md-12 text-center">
			<h2>Fight Section</h2>
			<br>
			<!-- Attack button goes here -->
			<br>
		</div>
	</div>

	<div class="row">
		<div class="col-md-6 attacker">
		<!-- Attacker icon will go here -->
		</div>
		<div class="col-md-6 defender">
		<!-- Defender icon will go here -->
		</div>
	</div>

	<div class="row">
		<div class="col-md-12 text-center">
			<h3>Select your team!</h3>
		</div>
	</div>
	<div class="row">
		<div class="col-md-12 text-center teams">
			<img src="assets/images/gators.jpeg" alt="Gators" class="img-responsive img-rounded">
			<img src="assets/images/kentucky.jpg" alt="Wildcats" class="img-responsive img-rounded">
			<img src="assets/images/seminoles.jpeg" alt="Seminoles" class="img-responsive img-rounded">
			<img src="assets/images/duke.jpg" alt="Blue Devils" class="img-responsive img-rounded">
		</div>
	</div>
</div>

<script type="text/javascript" src="assets/javascript/game.js"></script>
</body>
</html>
