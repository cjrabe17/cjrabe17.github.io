<!DOCTYPE html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
	<title>Hangman</title>
</head>
<body>
	<header class="text-center">
		<h1>Hangman</h1>
		<br>
		<h2>Video Game Edition</h2>
	</header>
	<div class="container-fluid">
		<div class="row">
			<div class="col-md-3"></div>

			<div class="col-md-3 left-box text-center">
				<img src="assets/images/claptrap.jpg" alt="Claptrap">
			</div>

			<div class="col-md-3 right-box text-center">
				<h3>Press any key to get started!</h3>
				<br>
				<p>Wins:</p>
				<div id="winCounter">0</div>
				<br>
				<p>Current Word:</p>
				<div id="underscores"></div>
				<br>
				<p>Number of Guesses Left:</p>
				<div id="remainingGuesses">13</div>
				<br>
				<p>Letters Already Guessed:</p>
				<div id="wrongGuesses"></div>
			</div>

			<div class="col-md-3"></div>
		</div>
	</div>

	<script src="assets/javascript/game.js"></script>

</body>
</html>
