<!DOCTYPE html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Train Schedule</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
	<script src="https://www.gstatic.com/firebasejs/4.8.1/firebase.js"></script>
</head>
<body>

<div class="container">
	<div class="jumbotron text-center">
		<h1>Any Time Is Train Time</h1>
		<h2>Choo Choo</h2>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-primary">
				<div class="panel-heading bg-primary">
					<h3 class="panel-title">Current Train Schedule</h3>
				</div>
				<table class="table">
					<tr class="tableHeaders">
						<th>Train Name</th>
						<th>Destination</th>
						<th>Frequency (Mins)</th>
						<th>Next Arrival</th>
						<th>Minutes Away</th>
					</tr>
				</table>
			</div>
		</div>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-primary">
				<div class="panel-heading">
					<h3 class="panel-title">Add Train</h3>
				</div>
				<div class="panel-body">
					<form>
						<div class="form-group">
							<label for="trainName">Train Name</label>
							<input class="form-control" id="trainName" type="text" required>
						</div>
						<div class="form-group">
							<label for="destination">Destination</label>
							<input class="form-control" id="destination" type="text" required>
						</div>
						<div class="form-group">
							<label for="firstTime">First Train Time</label>
							<input class="form-control" id="firstTime" type="time" required>
						</div>
						<div class="form-group">
							<label for="frequency">Frequency (mins)</label>
							<input class="form-control" id="frequency" type="number" required>
						</div>
						<button class="btn btn-primary" id="addTrain">Add Train to Schedule</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>

<script type="text/javascript" src="assets/javascript/app.js"></script>
<script src="https://cdn.jsdelivr.net/momentjs/2.12.0/moment.min.js"></script>

</body>
</html>
