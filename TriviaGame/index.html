<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Trivia</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/bootswatch/3.3.7/yeti/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="assets/css/style.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
</head>
<body>

<div class="container">
	<header>
		<h1>'90s Cartoon Trivia</h1>
	</header>
	<br>
	<br>
	<div class="row">
		<div class="col-md-6 col-md-offset-3 show-number">
			<!-- Timer display -->
			<h2>Time Remaining: </h2>
		</div>
	</div>
	<div class="row">
		<div class="col-md-6 col-md-offset-3 questions-section">
			<!-- Question display -->
		</div>
	</div>
	<div class="row">
		<div class="col-md-6 col-md-offset-3 answer-section">
			<!-- Answer choices display -->
			<button class="btn btn-info btn-block btn-lg buttonA" value="0"></button>
			<button class="btn btn-info btn-block btn-lg buttonB" value="1"></button>
			<button class="btn btn-info btn-block btn-lg buttonC" value="2"></button>
			<button class="btn btn-info btn-block btn-lg buttonD" value="3"></button>
		</div>
	</div>
	<div class="row">
		<div class="col-md-6 col-md-offset-3">
			<!-- Gifs and end stats displays -->
			<div class="image-section"></div>
			<div class="end-game">
				<button class="btn btn-warning btn-lg reset-button">Start Over?</button>
			</div>
		</div>
	</div>
	<div class="row">
		<div class="col-md-6 col-md-offset-3">
			<button class="btn btn-warning btn-block btn-lg start-button">Start</button>
		</div>
	</div>
	<br>
	<br>
</div>

<script type="text/javascript" src="assets/javascript/app.js"></script>


</body>
</html>
